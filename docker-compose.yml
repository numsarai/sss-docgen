version: '3.8'

services:
  onlyoffice:
    build: ./docker
    container_name: onlyoffice
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      - JWT_ENABLED=false
      - ALLOW_PRIVATE_IP_ADDRESS=true

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    volumes:
      - ./cases.db:/app/cases.db
      - ./output:/app/output
      - ./generated:/app/generated
      - ./templates:/app/templates
      - ./.env:/app/.env
    environment:
      - CORS_ORIGINS=*
    depends_on:
      - onlyoffice
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
